syntax = "proto3";

package sand.daemon.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/banksean/sand/internal/daemon/daemonpb";

service DaemonService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc Version(VersionRequest) returns (VersionResponse);
  rpc Shutdown(ShutdownRequest) returns (StatusResponse);
  rpc LogSandbox(IDRequest) returns (LogSandboxResponse);
  rpc ListSandboxes(ListSandboxesRequest) returns (ListSandboxesResponse);
  rpc ListDeletedSandboxes(ListSandboxesRequest) returns (ListSandboxesResponse);
  rpc GetSandbox(IDRequest) returns (GetSandboxResponse);
  rpc RemoveSandbox(IDRequest) returns (StatusResponse);
  rpc ExpungeSandbox(IDRequest) returns (StatusResponse);
  rpc StopSandbox(IDRequest) returns (StatusResponse);
  rpc StartSandbox(StartSandboxRequest) returns (StatusResponse);
  rpc SyncHostGitMirror(IDRequest) returns (SyncHostGitMirrorResponse);
  rpc ResolveAgentLaunchEnv(ResolveAgentLaunchEnvRequest) returns (ResolveAgentLaunchEnvResponse);
  rpc ExportImage(ExportImageRequest) returns (StatusResponse);
  rpc Stats(StatsRequest) returns (StatsResponse);
  rpc VSC(IDRequest) returns (StatusResponse);
  rpc CreateSandbox(CreateSandboxRequest) returns (stream CreateSandboxResponse);
  rpc RenameSandbox(RenameSandboxRequest) returns (RenameSandboxResponse);
  rpc EnsureImage(EnsureImageRequest) returns (stream EnsureImageResponse);
}

message PingRequest {}

message PingResponse {
  string status = 1;
}

message VersionRequest {}

message VersionResponse {
  string git_repo = 1;
  string git_branch = 2;
  string git_commit = 3;
  string build_time = 4;
  bytes build_info_json = 5;
  bool dev_build = 6;
}

message StatusResponse {
  string status = 1;
}

message ShutdownRequest {}

message IDRequest {
  string id = 1;
}

message LogSandboxResponse {
  bytes data = 1;
}

message ListSandboxesRequest {}

message ListSandboxesResponse {
  repeated Sandbox boxes = 1;
}

message GetSandboxResponse {
  Sandbox box = 1;
}

message StartSandboxRequest {
  string id = 1;
  bool ssh_agent = 2;
}

message SyncHostGitMirrorResponse {
  string mirror_path = 1;
}

message ResolveAgentLaunchEnvRequest {
  string agent = 1;
  string env_file = 2;
  string profile_name = 3;
  EnvPolicy profile_env = 4;
  bool profile_env_configured = 5;
}

message ResolveAgentLaunchEnvResponse {
  map<string, string> env = 1;
}

message EnvPolicy {
  repeated EnvFileRef files = 1;
  repeated EnvVarRule vars = 2;
}

message EnvFileRef {
  string path = 1;
  string scope = 2;
}

message EnvVarRule {
  string name = 1;
  string scope = 2;
}

message ExportImageRequest {
  string id = 1;
  string destination_path = 2;
}

message StatsRequest {
  repeated string ids = 1;
}

message StatsResponse {
  repeated ContainerStats stats = 1;
}

message Sandbox {
  string id = 1;
  string name = 2;
  string state = 3;
  string agent_type = 4;
  string profile_name = 5;
  string container_id = 6;
  string host_origin_dir = 7;
  string sandbox_work_dir = 8;
  string trash_work_dir = 9;
  google.protobuf.Timestamp deleted_at = 10;
  string image_name = 11;
  string dns_domain = 12;
  string env_file = 13;
  repeated string allowed_domains = 14;
  repeated MountSpec mounts = 15;
  repeated MountRequest mount_requests = 16;
  SharedCacheMounts shared_cache_mounts = 17;
  int32 cpus = 18;
  int32 memory_mb = 19;
  string sandbox_work_dir_error = 20;
  string sandbox_container_error = 21;
  string username = 22;
  string uid = 23;
  GitDetails original_git_details = 24;
  GitDetails current_git_details = 25;
  Container container = 26;
}

message MountSpec {
  string source = 1;
  string target = 2;
  bool read_only = 3;
}

message MountRequest {
  string kind = 1;
  string original = 2;
  string source = 3;
  string clone = 4;
  string target = 5;
  bool read_only = 6;
  string runtime = 7;
}

message SharedCacheMounts {
  string mise_cache_host_dir = 1;
  string apk_cache_host_dir = 2;
  string agent_cache_host_dir = 3;
}

message GitDetails {
  string remote_origin = 1;
  string branch = 2;
  string commit = 3;
  bool is_dirty = 4;
  bool has_relative = 5;
  int32 ahead = 6;
  int32 behind = 7;
}

message Container {
  repeated ContainerNetworkStatus networks = 1;
  ContainerStatus status = 2;
  ContainerConfig configuration = 3;
}

message ContainerNetworkStatus {
  string hostname = 1;
  string network = 2;
  string ipv4_address = 3;
  string ipv4_gateway = 4;
  string ipv6_address = 5;
  string ipv6_gateway = 6;
}

message ContainerStatus {
  string state = 1;
}

message ContainerConfig {
  repeated Mount mounts = 1;
  Platform platform = 2;
  bool virtualization = 3;
  InitProcess init_process = 4;
  DNS dns = 5;
  repeated ContainerNetwork networks = 6;
  string id = 7;
  string runtime_handler = 8;
  bool ssh = 9;
  Image image = 10;
  Resources resources = 11;
  bool rosetta = 12;
}

message Mount {
  MountType type = 1;
  string source = 2;
  string destination = 3;
  repeated string options = 4;
}

message MountType {
  bool tmpfs = 1;
  bool virtiofs = 2;
}

message Platform {
  string os = 1;
  string architecture = 2;
  string variant = 3;
}

message InitProcess {
  repeated string environment = 1;
  string executable = 2;
  string working_directory = 3;
  repeated string arguments = 4;
  bool terminal = 5;
  User user = 6;
}

message User {
  UserID id = 1;
}

message UserID {
  int32 uid = 1;
  int32 gid = 2;
}

message DNS {
  repeated string options = 1;
  repeated string nameservers = 2;
  repeated string search_domains = 3;
}

message ContainerNetwork {
  NetworkOptions options = 1;
  string network = 2;
}

message NetworkOptions {
  string hostname = 1;
  int32 mtu = 2;
}

message Image {
  string reference = 1;
  Descriptor descriptor = 2;
}

message Descriptor {
  string digest = 1;
  int64 size = 2;
  string media_type = 3;
}

message Resources {
  int32 cpus = 1;
  int64 memory_in_bytes = 2;
}

message ContainerStats {
  int64 block_read_bytes = 1;
  int64 block_write_bytes = 2;
  int64 cpu_usage_usec = 3;
  string id = 4;
  int64 memory_limit_bytes = 5;
  int64 memory_usage_bytes = 6;
  int64 network_rx_bytes = 7;
  int64 network_tx_bytes = 8;
  int64 num_processes = 9;
}

message SharedCacheConfig {
  bool mise = 1;
  bool apk = 2;
  bool agents = 3;
}

message CreateSandboxRequest {
  string id = 1;
  string clone_from_dir = 2;
  string image_name = 3;
  string env_file = 4;
  string agent = 5;
  bool ssh_agent = 6;
  string username = 7;
  string uid = 8;
  repeated string allowed_domains = 9;
  repeated string mounts = 10;
  SharedCacheConfig shared_caches = 11;
  int32 cpus = 12;
  int32 memory = 13;
  string profile_name = 14;
  repeated string clone_mounts = 15;
}

message CreateSandboxResponse {
  oneof event {
    string progress = 1;
    Sandbox box = 2;
    string error = 3;
  }
}

message RenameSandboxRequest {
  string old_name = 1;
  string new_name = 2;
}

message RenameSandboxResponse {
  Sandbox box = 1;
}

message EnsureImageRequest {
  string image_name = 1;
}

message EnsureImageResponse {
  oneof event {
    bytes progress = 1;
    string error = 2;
    bool ok = 3;
    ImagePullProgressUpdate pull_progress = 4;
  }
}

message ImagePullProgressUpdate {
  optional string description = 1;
  optional string sub_description = 2;
  optional string items_name = 3;
  optional int64 add_tasks = 4;
  optional int64 set_tasks = 5;
  optional int64 add_total_tasks = 6;
  optional int64 set_total_tasks = 7;
  optional int64 add_items = 8;
  optional int64 set_items = 9;
  optional int64 add_total_items = 10;
  optional int64 set_total_items = 11;
  optional int64 add_size = 12;
  optional int64 set_size = 13;
  optional int64 add_total_size = 14;
  optional int64 set_total_size = 15;
}

version: 2

before:
  hooks:
    - go mod tidy

builds:
  # Host-side CLI (macOS only)
  - id: sand
    binary: sand
    main: ./cmd/sand
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -X 'github.com/banksean/sand/internal/version.GitRepo={{ .Env.RELEASE_GIT_REPO }}'
      - -X 'github.com/banksean/sand/internal/version.GitBranch={{ .Tag }}'
      - -X 'github.com/banksean/sand/internal/version.GitCommit={{ .FullCommit }}'
      - -X 'github.com/banksean/sand/internal/version.BuildTime={{ .Date }}'

  # Container-side CLI (Linux only) — built from the same cmd/sand package
  # using the linux build tag, producing the "innie" binary
  - id: innie
    binary: innie
    main: ./cmd/sand
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -X 'github.com/banksean/sand/internal/version.GitRepo={{ .Env.RELEASE_GIT_REPO }}'
      - -X 'github.com/banksean/sand/internal/version.GitBranch={{ .Tag }}'
      - -X 'github.com/banksean/sand/internal/version.GitCommit={{ .FullCommit }}'
      - -X 'github.com/banksean/sand/internal/version.BuildTime={{ .Date }}'

  # Daemon process (macOS only)
  - id: sandd
    binary: sandd
    main: ./cmd/sandd
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -X 'github.com/banksean/sand/internal/version.GitRepo={{ .Env.RELEASE_GIT_REPO }}'
      - -X 'github.com/banksean/sand/internal/version.GitBranch={{ .Tag }}'
      - -X 'github.com/banksean/sand/internal/version.GitCommit={{ .FullCommit }}'
      - -X 'github.com/banksean/sand/internal/version.BuildTime={{ .Date }}'

archives:
  - id: sand-combined
    ids: [sand, sandd]
    formats: [tar.gz]
    name_template: "sand_{{ .Os }}_{{ .Arch }}"
  - id: innie
    ids: [innie]
    formats: [tar.gz]
    name_template: "{{ .Binary }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  draft: false
  replace_existing_draft: true

homebrew_casks:
  - name: sand
    ids: [sand-combined]
    binaries:
      - sand
      - sandd
    repository:
      owner: banksean
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/banksean/sand"
    description: "Local development sandbox containers"

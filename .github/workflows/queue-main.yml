# Commit Queue
#
# To submit a change to the queue, run:
# git push -f origin HEAD:queue-main-$USER 

name: CI
run-name: |
  ${{ github.event.inputs.original_run_name && format('{0} (rebase attempt {1})', github.event.inputs.original_run_name, github.event.inputs.rebase_attempt) || github.event.head_commit.message }}
on:
  push:
    branches:
      - "queue-main-*"
  workflow_dispatch:
    inputs:
      rebase_attempt:
        description: "Rebase attempt number (starts at 0, increments with each retry)"
        required: false
        default: "0"
        type: string
      original_run_name:
        description: "Original run name to preserve across rebase attempts"
        required: false
        type: string

permissions: read-all

jobs:
  formatting:
    uses: ./.github/workflows/formatting.yml
    permissions:
      contents: write
    with:
      auto_fix: true

  go-test:
    needs: [formatting]
    uses: ./.github/workflows/go.yml
    permissions: read-all
    with:
      ref: ${{ needs.formatting.outputs.commit_sha }}
      include-slow-tests: false

  coverage-report:
    runs-on: macos-26
    needs: [formatting, go-test]
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.formatting.outputs.commit_sha }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Download coverage profile
        uses: actions/download-artifact@v4
        with:
          name: code-coverage
          path: coverage

      - name: Generate coverage reports
        run: |
          go tool cover -func=coverage/coverage.txt > coverage/coverage-summary.txt
          go tool cover -html=coverage/coverage.txt -o coverage/coverage.html

          {
            echo "## Go test coverage"
            echo
            echo '```'
            cat coverage/coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/coverage.txt
            coverage/coverage-summary.txt
            coverage/coverage.html
          retention-days: 30

  # Uncomment to enable smoke tests as part of the queue
  # smoke-test:
  #   needs: [formatting]
  #   uses: ./.github/workflows/smoke-test.yml
  #   permissions:
  #     contents: read
  #   with:
  #     ref: ${{ needs.formatting.outputs.commit_sha }}

  push-to-main:
    runs-on: macos-26
    needs:
      [
        coverage-report,
        go-test,
        formatting,
      ]
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to main
        run: scripts/push-to-main.sh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REBASE_ATTEMPT: ${{ github.event.inputs.rebase_attempt || '0' }}
          FORMAT_SHA: ${{ needs.formatting.outputs.commit_sha }}
          ORIGINAL_RUN_NAME: ${{ github.event.inputs.original_run_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          REPOSITORY: ${{ github.repository }}
          CURRENT_BRANCH: ${{ github.ref }}

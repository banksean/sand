# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  DAEMON_PROTO: internal/daemon/daemonpb/daemon.proto
  DAEMON_PROTO_OUT_DIR: .

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  proto:generate:
    aliases:
      - generate:proto
      - gen:proto
    desc: Generate Go protobuf and gRPC bindings for the daemon API
    cmds:
      - >-
        protoc
        --go_out={{.DAEMON_PROTO_OUT_DIR}}
        --go_opt=paths=source_relative
        --go-grpc_out={{.DAEMON_PROTO_OUT_DIR}}
        --go-grpc_opt=paths=source_relative
        {{.DAEMON_PROTO}}

  build:
    desc: Build all Go packages
    deps:
      - proto:generate
    cmds:
      - go build -v ./...

  test:
    desc: Run Go tests
    deps:
      - proto:generate
    cmds:
      - GOEXPERIMENT=synctest gotestsum ./...

  install:
    desc: Install Go commands
    deps:
      - stopdaemon
    cmds:
      - go install ./cmd/...

  stopdaemon:
    ignore_error: true
    cmds:
      - echo "Stopping sandd..."
      - sandd stop

  grafana:
    deps:
      - tempo
    cmds:
      - mkdir -p ~/grafana-data
      - echo "Starting grafana"
      - >-
        container run
        --name grafana
        --detach
        --cpus 2
        --memory 512M
        -p 3000:3000/tcp
        --volume ~/grafana-data:/var/lib/grafana
        --volume {{.TASKFILE_DIR}}/observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/sand.yaml:ro
        -e GF_USERS_ALLOW_SIGN_UP=false
        grafana/grafana:latest

  tempo:
    cmds:
      - mkdir -p ~/sand-observability/tempo-data
      - echo "Starting tempo"
      - >-
        container run
        --name tempo
        --detach
        --cpus 2
        --memory 512M
        -p 3200:3200/tcp
        -p 4317:4317/tcp
        -p 4318:4318/tcp
        --volume {{.TASKFILE_DIR}}/observability/tempo.yaml:/etc/tempo.yaml:ro
        --volume ~/sand-observability/tempo-data:/var/tempo
        grafana/tempo:latest
        -config.file=/etc/tempo.yaml

  stopgrafana:
    cmds:
      - echo "Stopping grafana and tempo..."
      - container rm -f grafana
      - container rm -f tempo

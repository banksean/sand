# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  DAEMON_PROTO: internal/daemon/daemonpb/daemon.proto
  DAEMON_PROTO_OUT_DIR: .
  OBSERVABILITY_DATA_DIR: '{{.TASKFILE_DIR}}/.observability-data'
  CONTAINER_DNS_DOMAIN: '{{.CONTAINER_DNS_DOMAIN | default "dev.local"}}'
  GIT_REPO:
    sh: git remote get-url origin
  GIT_BRANCH:
    sh: git branch --show-current
  GIT_COMMIT:
    sh: git rev-parse HEAD
  BUILD_TIME:
    sh: TZ=America/Los_Angeles date -Iseconds
  VERSION_PACKAGE: github.com/banksean/sand/internal/version
  LDFLAGS: >-
    -X '{{.VERSION_PACKAGE}}.GitRepo={{.GIT_REPO}}'
    -X '{{.VERSION_PACKAGE}}.GitBranch={{.GIT_BRANCH}}'
    -X '{{.VERSION_PACKAGE}}.GitCommit={{.GIT_COMMIT}}'
    -X '{{.VERSION_PACKAGE}}.BuildTime={{.BUILD_TIME}}'
    -X '{{.VERSION_PACKAGE}}.DevBuild="true"'
  MISE_EXEC: >-
    if command -v mise >/dev/null 2>&1; then
      exec mise exec -- "$@";
    else
      exec "$@";
    fi

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  proto:generate:
    aliases:
      - generate:proto
      - gen:proto
    desc: Generate Go protobuf and gRPC bindings for the daemon API
    cmds:
      - >-
        sh -c '{{.MISE_EXEC}}' --
        protoc
        --go_out={{.DAEMON_PROTO_OUT_DIR}}
        --go_opt=paths=source_relative
        --go-grpc_out={{.DAEMON_PROTO_OUT_DIR}}
        --go-grpc_opt=paths=source_relative
        {{.DAEMON_PROTO}}

  generate:
    deps:
      - proto:generate
    cmds:
      - sh -c '{{.MISE_EXEC}}' -- go generate ./...

  build:
    desc: Build all Go packages
    deps:
      - generate
    cmds:
      - >-
        go build -v
        -ldflags "{{.LDFLAGS}}"
        ./...

  test:
    desc: Run Go tests
    deps:
      - generate
    cmds:
      - gotestsum ./...

  install:
    desc: Install Go commands
    deps:
      - stopdaemon
      - generate
    cmds:
      - >-
        go install -v
        -ldflags "{{.LDFLAGS}}"
        ./cmd/...

  install-global:
    desc: Install Go commands (globally)
    deps:
      - stopdaemon
      - generate
    cmds:
      - >-
        go install -v
        -ldflags "{{.LDFLAGS}}"
        ./cmd/...

  stopdaemon:
    ignore_error: true
    cmds:
      - echo "Stopping sandd..."
      - sandd stop

  start-observability:
    deps:
      - tempo
    cmds:
      - mkdir -p {{.OBSERVABILITY_DATA_DIR}}/grafana
      - echo "Starting grafana.{{.CONTAINER_DNS_DOMAIN}}"
      - >-
        container run
        --name grafana
        --detach
        --cpus 2
        --memory 512M
        -p 3000:3000/tcp
        --volume {{.OBSERVABILITY_DATA_DIR}}/grafana:/var/lib/grafana
        -e GF_USERS_ALLOW_SIGN_UP=false
        docker.io/grafana/grafana:latest
      - echo "Waiting a bit for grafana to start, before POSTing the tempo datasource..."
      - sleep 1
      - >-
        curl -H "Content-Type: application/json"
        -d '{
          "name":"Tempo",
          "uid":"tempo",
          "type":"tempo",
          "url":"http://tempo.{{.CONTAINER_DNS_DOMAIN}}:3200",
          "access":"proxy",
          "isDefault":true,
          "editable":true,
          "jsonData": {
            "httpMethod": "GET"
          }
        }'
        http://admin:admin@grafana.{{.CONTAINER_DNS_DOMAIN}}:3000/api/datasources

  tempo:
    cmds:
      - mkdir -p {{.OBSERVABILITY_DATA_DIR}}/tempo
      - echo "Starting tempo.{{.CONTAINER_DNS_DOMAIN}}"
      - >-
        container run
        --name tempo
        --detach
        --cpus 2
        --memory 512M
        -p 3200:3200/tcp
        -p 4317:4317/tcp
        -p 4318:4318/tcp
        --volume {{.TASKFILE_DIR}}/observability/tempo.yaml:/etc/tempo.yaml:ro
        --volume {{.OBSERVABILITY_DATA_DIR}}/tempo:/var/tempo
        docker.io/grafana/tempo:latest
        -config.file=/etc/tempo.yaml

  stop-observability:
    ignore_error: true
    cmds:
      - echo "Stopping grafana and tempo..."
      - container rm -f grafana
      - container rm -f tempo

  clear-observability:
    deps:
      - stop-observability
    cmds:
      - echo "Clearing persistent observability data from {{.OBSERVABILITY_DATA_DIR}}"
      - rm -r {{.OBSERVABILITY_DATA_DIR}}
